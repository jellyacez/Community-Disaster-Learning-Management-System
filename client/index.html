<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP (Content Security Policy) — Defence-in-depth fallback.
      The server-side Helmet CSP is the primary enforcement layer.
      NOTE: Vite dev mode (npm run dev) requires 'unsafe-eval' for Hot Module Replacement.
            It is intentionally REMOVED here so the production build is not weakened.
            If you see CSP errors in dev, this is expected and safe to ignore.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https: blob:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'wasm-unsafe-eval'; connect-src 'self' data: http://localhost:* ws://localhost:* https:; frame-src 'self' blob:; object-src 'self' blob:;" />
    <meta name="description" content="Community Disaster Learning Management System - Empowering residents with disaster preparedness training and real-time announcements." />
    <title>Bacolor LMS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
